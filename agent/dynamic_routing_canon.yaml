# Default routing / delegation canon (repo). Overlay: ${HERMES_HOME}/routing_canon.yaml
# Merged with deep-merge; overlay keys override defaults.

version: 3

# Philosophy order (documentation; enforcement is in routing code paths):
# 1) cost + compatibility  2) speed + efficiency  3) memory + usefulness
#
# Quota / rate-limit failover order (OPM on, single run_conversation turn):
#   1) Native api.openai.com model ladder (opm_native_quota_downgrade)
#   2) OpenRouter explicit hub ids in order (same logical models; openai/… slugs)
#   3) OpenRouter auto router (openrouter/auto — provider picks downstream model)
#   4) Config fallback chain (direct Gemini tier router, optional_gemini,
#      openrouter_last_resort, etc. — see free_model_routing + fallback_providers)
# Each new user turn resets to step 1 via tier/OPM primary selection.

openai_primary_mode:
  # When true in config, native OpenAI slugs are treated as "free tier" for policy.
  # When OPM is off or suppressed for the turn, native OpenAI is consultant-class for policy.
  native_openai_policy_class_when_opm_active: free
  native_openai_policy_class_when_opm_inactive: consultant

consultant_escalation:
  # Merged into token-governance consultant_routing (overlay wins on leaf keys).
  tiers_requiring_deliberation: ["E", "F", "G"]
  # Token caps for internal router/challenger/chief (advisory; code may clamp).
  router_max_tokens: 400
  challenger_max_tokens: 350
  chief_max_tokens: 400

openrouter_auto:
  # When primary model is openrouter/auto, require deliberation for these tiers.
  deliberation_tiers: ["D", "E", "F", "G"]
  # Also force deliberation for tier G when model id contains "openrouter"
  openrouter_tier_g_always_deliberate: true

operator_gate:
  enabled: true
  # When Chief denies consultant-class use (merged tier was E/F/G), prompt operator via
  # clarify_callback on the agent. Choices map to routing_canon operator_choice_* below.
  timeout_hint_seconds: 120
  # clarify_callback return substring match (case-insensitive)
  choice_accept_cheaper: "accept"
  choice_force_consultant: "force"

# Telemetry
routing_trace:
  include_canon_version_in_pre_llm_trace: true

# OPM: when api.openai.com hits quota/rate limits, step through native models before
# cross-provider fallback. Each new user turn still starts from tier/OPM top pick;
# the ladder only applies inside the same run_conversation retry loop.
opm_native_quota_downgrade:
  enabled: true
  # Bare ``gpt-5.3`` is not a valid api.openai.com model id (400 model_not_found).
  # Ladder uses official GPT-5.4 variants then GPT-5.2 (see platform model docs).
  chat_models:
    - gpt-5.4
    - gpt-5.4-mini
    - gpt-5.4-nano
    - gpt-5.2
  codex_models:
    - gpt-5.3-codex
    - gpt-5.2-codex

# After the native OpenAI ladder is exhausted (and when OPENROUTER_API_KEY is set),
# try OpenRouter with the same models top-first, then openrouter/auto, then the
# synthesized/config fallback chain. Omit lists to derive openai/<slug> from
# opm_native_quota_downgrade chat_models / codex_models.
opm_cross_provider_quota_failover:
  enabled: true
  openrouter_chat_models:
    - openai/gpt-5.4
    - openai/gpt-5.4-mini
    - openai/gpt-5.4-nano
    - openai/gpt-5.2
  openrouter_codex_models:
    - openai/gpt-5.3-codex
    - openai/gpt-5.2-codex
  openrouter_auto:
    enabled: true
    model: openrouter/auto

# Hard budget (USD estimates from providers vs AUD display cap)
# API costs are accumulated in USD; daily_budget_aud is converted with aud_to_usd (USD per 1 AUD).
hard_budget:
  enabled: true
  daily_budget_aud: 10.0
  # Calendar day + “reset in …” for the budget bar (IANA tz). Override in routing_canon.yaml.
  reset_timezone: Australia/Sydney
  # Approximate FX: how many USD equals one AUD (adjust in HERMES_HOME/routing_canon.yaml).
  aud_to_usd: 0.65
  session_budget_usd: 2.5
  spike_threshold_usd_per_min: 0.5
  # Bottom TUI bar (CLI): turn cost, daily AUD/USD, hours to local midnight
  show_tui_bar: true
