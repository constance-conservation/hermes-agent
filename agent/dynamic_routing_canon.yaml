# Default routing / delegation canon (repo). Overlay: ${HERMES_HOME}/routing_canon.yaml
# Merged with deep-merge; overlay keys override defaults.

version: 8

# Philosophy order (documentation; enforcement is in routing code paths):
# 1) cost + compatibility  2) speed + efficiency  3) memory + usefulness
#
# -----------------------------------------------------------------------------
# Route UP (escalation — one step toward a more capable model)
# -----------------------------------------------------------------------------
# - OpenRouter hub (openai/…): advance exactly ONE rung per escalation along
#   ``openrouter_step_up_escalation.chat_models`` / ``codex_models`` toward the
#   tier ceiling (see ``build_ladder_to_ceiling`` + ``_or_stepup_idx`` in run_agent).
#   Triggers: quota-class API errors when ``escalate_on_quota_errors``, or an
#   assistant reply that is ONLY ``escalate_marker`` when ``escalate_on_escalate_marker``.
#   Do not skip rungs; ``max_escalations_per_turn`` caps loops.
# - Native OpenAI (OPM): ``opm_native_quota_downgrade`` steps one model id at a time
#   on quota (expensive→cheaper is the *downgrade* ladder; escalation across providers
#   follows ``opm_cross_provider_quota_failover``).
# - Consultant tiers (E/F/G): ``consultant_routing`` + ``operator_gate`` — deliberate
#   escalation; hard jump to E only on pushback / repeated failure (see consultant_routing).
#
# -----------------------------------------------------------------------------
# Route DOWN (cheaper / simpler — lowest feasible first, then climb if inadequate)
# -----------------------------------------------------------------------------
# - ``tier_models`` in ``workspace/memory/runtime/operations/hermes_token_governance.runtime.yaml`` MUST
#   map A→…→G to DISTINCT models (cheap→capable). If A–E all point at the same slug,
#   per-tier downshifts are ineffective.
# - Default competent tier: ``default_routing_tier`` (typically D) before heuristics.
# - Heuristics: ``tier_model_routing.select_tier_for_message`` narrows to B/C for short/simple
#   prompts; OPM may uplift low tiers to E/F for coding/reasoning (token_governance_runtime).
# - ``smart_model_routing`` optional cheap route for very short non-complex messages (config).
# - If a down-tier answer is insufficient: user pushback / retries → ``resolve_consultant_tier``;
#   on OpenRouter, ``[HERMES_ESCALATE]`` requests exactly one step up the hub ladder.
#
# Quota / rate-limit failover order (OPM on, single run_conversation turn):
#   1) Native api.openai.com model ladder (opm_native_quota_downgrade)
#   2) OpenRouter explicit hub ids in order (same logical models; openai/… slugs)
#   3) OpenRouter auto router (openrouter/auto — provider picks downstream model)
#   4) Config fallback chain (direct Gemini tier router, optional_gemini,
#      openrouter_last_resort, etc. — see free_model_routing + fallback_providers)
# Each new user turn resets to step 1 via tier/OPM primary selection.
#
# While ``_fallback_activated`` is true (still on a fallback stack), per-turn tier routing
# is skipped for non-OpenRouter runtimes so the provider stays stable. On OpenRouter,
# tier routing still runs so ``tier_models`` can change per turn (e.g. gpt-5.4 vs mini).
#
# OpenRouter step-up (cheap → capable): first API attempt uses the cheapest hub id that
# still reaches the tier ceiling, then steps up on quota-class errors or an optional
# ``[HERMES_ESCALATE]`` marker response. Disable in ``${HERMES_HOME}/routing_canon.yaml``.

openrouter_step_up_escalation:
  enabled: true
  # Cheap → capable (first hop is lowest cost toward tier ceiling).
  chat_models:
    - openrouter/free
    - openai/gpt-5-mini
    - openai/gpt-4.1-mini
    - openai/gpt-5.4-mini
    - openai/gpt-5.2
    - openai/gpt-5.4
  codex_models:
    - openai/gpt-5.2-codex
    - openai/gpt-5.3-codex
  max_escalations_per_turn: 12
  escalate_on_quota_errors: true
  escalate_on_escalate_marker: true
  escalate_marker: "[HERMES_ESCALATE]"

openai_primary_mode:
  # When true in config, native OpenAI slugs are treated as "free tier" for policy.
  # When OPM is off or suppressed for the turn, native OpenAI is consultant-class for policy.
  native_openai_policy_class_when_opm_active: free
  native_openai_policy_class_when_opm_inactive: consultant

consultant_escalation:
  # Merged into token-governance consultant_routing (overlay wins on leaf keys).
  tiers_requiring_deliberation: ["D", "E", "F", "G"]
  # Token caps for internal router/challenger/chief (advisory; code may clamp).
  router_max_tokens: 400
  challenger_max_tokens: 350
  chief_max_tokens: 400

openrouter_auto:
  # When primary model is openrouter/auto, require deliberation for these tiers.
  deliberation_tiers: ["D", "E", "F", "G"]
  # Also force deliberation for tier G when model id contains "openrouter"
  openrouter_tier_g_always_deliberate: true

operator_gate:
  enabled: true
  # When Chief denies consultant-class use (merged tier was D–G when deliberation applies), prompt operator via
  # clarify_callback on the agent. Choices map to routing_canon operator_choice_* below.
  timeout_hint_seconds: 120
  # clarify_callback return substring match (case-insensitive)
  choice_accept_cheaper: "accept"
  choice_force_consultant: "force"

# Telemetry
routing_trace:
  include_canon_version_in_pre_llm_trace: true

# OPM: when api.openai.com hits quota/rate limits, step through native models before
# cross-provider fallback. Each new user turn still starts from tier/OPM top pick;
# the ladder only applies inside the same run_conversation retry loop.
opm_native_quota_downgrade:
  enabled: true
  # Bare ``gpt-5.3`` is not a valid api.openai.com model id (400 model_not_found).
  # Ladder uses official GPT-5.4 variants then GPT-5.2 (see platform model docs).
  # Expensive → cheaper (quota downgrade walks forward in this list).
  chat_models:
    - gpt-5.4
    - gpt-5.2
    - gpt-5.4-mini
    - gpt-5-mini
    - gpt-4.1-mini
  codex_models:
    - gpt-5.3-codex
    - gpt-5.2-codex

# After the native OpenAI ladder is exhausted (and when OPENROUTER_API_KEY is set),
# try OpenRouter with the same models top-first, then openrouter/auto, then the
# synthesized/config fallback chain. Omit lists to derive openai/<slug> from
# opm_native_quota_downgrade chat_models / codex_models.
opm_cross_provider_quota_failover:
  enabled: true
  # Same cheap→capable order as openrouter_step_up (try budget class on OR after native exhaustion).
  openrouter_chat_models:
    - openrouter/free
    - openai/gpt-5-mini
    - openai/gpt-4.1-mini
    - openai/gpt-5.4-mini
    - openai/gpt-5.2
    - openai/gpt-5.4
  openrouter_codex_models:
    - openai/gpt-5.3-codex
    - openai/gpt-5.2-codex
  openrouter_auto:
    enabled: true
    model: openrouter/auto

# Hard budget (USD estimates from providers vs AUD display cap)
# API costs are accumulated in USD; daily_budget_aud is converted with aud_to_usd (USD per 1 AUD).
hard_budget:
  enabled: true
  daily_budget_aud: 10.0
  # Calendar day + “reset in …” for the budget bar (IANA tz). Override in HERMES_HOME/routing_canon.yaml.
  reset_timezone: Australia/Sydney
  # Approximate FX: how many USD equals one AUD (adjust in HERMES_HOME/routing_canon.yaml).
  aud_to_usd: 0.65
  session_budget_usd: 2.5
  spike_threshold_usd_per_min: 0.5
  # Bottom TUI bar (CLI): turn cost, daily AUD/USD, hours to local midnight
  show_tui_bar: true
  # When true: reaching the daily cap does NOT auto-switch to fallback; all LLM calls stop
  # until the operator answers clarify_callback once per session (approve/deny). Deny blocks
  # paid calls for the session; /new or reset_session_state clears the decision. Without
  # clarify_callback, calls stay blocked while exhausted. Gateway-only profiles: set false in
  # ${HERMES_HOME}/routing_canon.yaml if you need auto-fallback when cap is hit without a TUI.
  operator_approval_when_daily_cap_exceeded: true

# -----------------------------------------------------------------------------
# Compression defaults (canon-first; profile config.yaml compression.* may overlay)
# -----------------------------------------------------------------------------
compression:
  # Every N user turns trigger lossy pass when lossy_mode is true (0 = interval off).
  turn_interval: 0
  lossy_mode: false
  preserve_last_pairs: 2

# -----------------------------------------------------------------------------
# Synthetic selector: openrouter/free (OpenRouter “Free Models Router”)
# -----------------------------------------------------------------------------
# Official API: set ``model`` to ``openrouter/free``; OpenRouter picks a free model that matches
# the request and the account’s data-policy / guardrails (see their docs). Hermes defaults to
# that passthrough (``api_use_native_free_router: true``).
#
# With ``api_use_native_free_router: false``, Hermes pre-resolves to one concrete ``:free`` slug
# from ``candidate_slugs`` ∩ live ``GET /models`` (legacy; can 404 if the slug violates privacy).
#
# Quota errors or a lone ``[HERMES_ESCALATE]`` advance along ``openrouter_step_up_escalation``
# toward paid hub ids (nano → … → ceiling). ``strict_no_paid_fallback`` applies only to legacy
# concrete resolution, not to the native router string.
openrouter_free_router:
  enabled: true
  api_use_native_free_router: true
  strict_no_paid_fallback: true
  ranking: capability_score
  live_fetch_ttl_seconds: 3600
  empty_error_message: >-
    openrouter/free: no free-tier OpenRouter model matched the allowlist.
    Set OPENROUTER_API_KEY, expand openrouter_free_router.candidate_slugs in routing canon,
    or pick a different /models option.
  candidate_slugs:
    - nvidia/nemotron-3-super-120b-a12b:free
    - arcee-ai/trinity-large-preview:free
    - google/gemma-3-4b-it:free
    - google/gemma-3-12b-it:free
    - meta-llama/llama-3.3-70b-instruct:free
    - mistralai/mistral-7b-instruct:free
    - qwen/qwen-2.5-7b-instruct:free
    - deepseek/deepseek-r1-distill-llama-70b:free
    - microsoft/phi-3-mini-128k-instruct:free
    - openai/gpt-oss-120b:free
    - openai/gpt-oss-20b:free
  capability_scores:
    "nvidia/nemotron-3-super-120b-a12b:free": 95
    "arcee-ai/trinity-large-preview:free": 88
    "deepseek/deepseek-r1-distill-llama-70b:free": 87
    "meta-llama/llama-3.3-70b-instruct:free": 86
    "openai/gpt-oss-120b:free": 90
    "openai/gpt-oss-20b:free": 78
    "google/gemma-3-12b-it:free": 72
    "google/gemma-3-4b-it:free": 55
    "mistralai/mistral-7b-instruct:free": 50
    "qwen/qwen-2.5-7b-instruct:free": 52
    "microsoft/phi-3-mini-128k-instruct:free": 48

# -----------------------------------------------------------------------------
# Lazy tool surface (API tools= subset; default off)
# -----------------------------------------------------------------------------
agent_lazy_tool_loading:
  enabled: false
  core_toolsets:
    - memory
  core_tools: []
  expand_via: meta_tool

# -----------------------------------------------------------------------------
# Semantic tool result cache (profile-local SQLite; default off)
# -----------------------------------------------------------------------------
agent_semantic_cache:
  enabled: false
  ttl_seconds: 3600
  sqlite_relpath: semantic_tool_cache.sqlite
  allow_tools: []
  host_role_env_precedence:
    - HERMES_CLI_INSTANCE_LABEL
    - HERMES_GATEWAY_LOCK_INSTANCE

# -----------------------------------------------------------------------------
# Per-turn output / reasoning caps (default off)
# -----------------------------------------------------------------------------
agent_cost_caps:
  enabled: false
  extractive_max_output_tokens: 1024
  extractive_user_message_max_chars: 800
  extractive_keywords:
    - summarize
    - bullet
    - list
    - extract
    - classify
  preserve_full_for_tiers: ["E", "F", "G"]

# -----------------------------------------------------------------------------
# Concise operational replies (ephemeral injection only; default off)
# -----------------------------------------------------------------------------
agent_concise_output:
  enabled: false
  ephemeral_fragment: >-
    Prefer terse operational answers: short bullets or diff-only when editing code.
    Skip filler and preambles unless the user asks for explanation.
