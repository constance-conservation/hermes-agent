# Free-model fallback when paid APIs fail (merge into ~/.hermes/config.yaml).
# Hermes seeds defaults in DEFAULT_CONFIG (``_config_version`` 18+); override here as needed.
#
# Default order after primary failure:
#   1) kimi_router — Kimi router model picks one hub id from tiers by prompt (HF router API)
#   2) optional_gemini — optional last resort (hosted Gemma/Gemini API)
#
# Optional (opt-in): HF Inference Providers policy hop — set inference.enabled: true and model/policy.
# That route uses included HF Inference credits quickly; prefer Kimi-only unless you know you need it.
#
# If you prefer a fully explicit chain instead, set ``fallback_providers: [ ... ]``
# and omit or disable ``free_model_routing``.

free_model_routing:
  enabled: true
  inference:
    enabled: false
    # Opt-in only (uses HF Inference Provider credits):
    # enabled: true
    # model: MiniMaxAI/MiniMax-M2.5
    # policy: fastest                 # fastest | cheapest | preferred
  kimi_router:
    router_model: moonshotai/Kimi-K2-Thinking
    tiers:
      - id: general
        description: "General and multimodal"
        models:
          - MiniMaxAI/MiniMax-M2.5
          - google/gemma-3-27b-it
      - id: reasoning
        description: "Reasoning, math, and code"
        models:
          - deepseek-ai/DeepSeek-R1
          - openai/gpt-oss-120b
          - Qwen/QwQ-32B
      - id: router_thinking
        description: "Long CoT / agentic"
        models:
          - moonshotai/Kimi-K2-Thinking
  optional_gemini:
    enabled: true
    model: gemma-4-31b-it
    only_rate_limit: true
    restore_health_check: true

# Explicit opt-out of any free fallback:
# fallback_providers: []

# Or full manual override (disables synthesis from free_model_routing):
# fallback_providers:
#   - provider: huggingface
#     model: your-org/your-model
#     hf_inference_policy: fastest
