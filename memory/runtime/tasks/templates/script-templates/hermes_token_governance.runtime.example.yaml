# Machine-readable token governance for Hermes (copy to workspace/operations/).
# Path: HERMES_HOME/workspace/operations/hermes_token_governance.runtime.yaml
#
# Hermes already loads this file when present and enabled: true — see
# agent/token_governance_runtime.py (apply_token_governance_runtime from run_agent.py).
# Do not patch hermes-agent run_agent.py to add another loader. Follow the keys in this
# template (tier_models A–F, chief_default_tier, blocked_model_substrings, …). Ad-hoc
# keys such as model_tiers / tool_restrictions_by_role are not read by Hermes.
#
# Aligns with policies/core/runtime/agent/memory/governance/source/standards/token-model-tool-and-channel-governance-policy.md
# (Tiers A–F) and workspace/operations/MODEL_ROUTING_REGISTRY.md. Edit **tier_models** when
# OpenRouter pricing or availability changes — do not scatter model IDs across config by hand.
#
# In config.yaml use `tier:X` for a fixed tier letter, or `tier:dynamic` so Hermes picks
# tier per prompt from **tier_models** (auxiliary, delegation, and optional main model).
# Fixed letters resolve at load_config(); `tier:dynamic` is resolved per call from message text.
#
# Visibility (CLI + gateway): at agent start, "Token governance: baseline Tier D → <model>";
# each user message, "Token governance: this turn Tier X → <model>" (X from heuristics).
#
# Disable enforcement: HERMES_TOKEN_GOVERNANCE_DISABLE=1
# Allow blocked models through: HERMES_GOVERNANCE_ALLOW_PREMIUM=1
#
# When the primary OpenRouter (or other) tier hits quota/rate limits, configure
# fallback_model in profiles/<name>/config.yaml (see chief-orchestrator-profile.example.yaml):
# provider gemini + model gemma-4-31b-it + only_rate_limit + restore_health_check so Hermes
# uses hosted Gemma 4 via generativelanguage.googleapis.com (GEMINI_API_KEY) until the primary
# passes a minimal ping again.

version: 1
enabled: true

# Concrete OpenRouter slugs per tier (see policy § Model Tiering Framework).
# Tier E/F: OpenAI GPT-5 consultants on api.openai.com (OPENAI_API_KEY). Use only when
# consultant_routing deliberation approves (policy § Consultant model).
tier_models:
  # Do not use openrouter/auto here — it may route to Anthropic without org deliberation.
  A: "google/gemini-2.5-flash"
  B: "google/gemini-2.5-flash-lite"
  # OpenRouter: use deepseek-r1 (deepseek-reasoner is the DeepSeek-direct API name, not a valid OR slug).
  C: "deepseek/deepseek-r1"
  D: "google/gemini-2.5-flash"
  E: "gpt-5.4"
  F: "gpt-5-codex"

# Chief orchestrator baseline when config says `model.default: tier:D` (or omit default_model here).
chief_default_tier: D

# When a configured model matches blocked_model_substrings, fall back to this tier (usually B).
blocked_fallback_tier: B

# Optional: single-string default_model (resolved if it is `tier:X`); if omitted, tier_models[chief_default_tier] is used for blocklist replacement when needed.
# default_model: "tier:D"

blocked_model_substrings:
  - claude-opus
  - claude-sonnet-4
  - claude-sonnet-4.5
  - anthropic/claude
  - claude-3.5-sonnet
  - gpt-4
  - openai/o1
  - openai/o3

# Session 6–7 governance target: cap chief iterations (apply_token_governance_runtime in run_agent).
max_agent_turns: 50
delegation_max_iterations: 30

# Per user message, pick tier and set the main agent model from tier_models (default: true).
dynamic_tier_routing: true

# Fallback when B/C keyword heuristics do not match:
# - D, B, C, … — fixed letter (legacy; many prompts fell through to D).
# - chief — use chief_default_tier as the fallback letter.
# - dynamic — short ambiguous prompts use chief_default_tier; longer text uses length bands
#   (adjust thresholds/tiers below so “default” is not a single fixed slug).
default_routing_tier: dynamic

# Used only when default_routing_tier is dynamic (message length after B/C rules).
dynamic_fallback_medium_chars: 800
dynamic_fallback_long_chars: 2800
dynamic_fallback_medium_tier: C
dynamic_fallback_long_tier: D

# Chief-orchestrator consultant routing (policy § Tier E/F): cheap LLM router + internal
# challenger + Chief approval. Deliberation is logged to
# workspace/operations/consultant_deliberations.jsonl (not injected into user chat).
# Operators are not prompted; disable with HERMES_CONSULTANT_ROUTING_DISABLE=1.
consultant_routing:
  enabled: true
  # Premium tiers (E/F): internal challenger + Chief JSON approval in agent/consultant_routing.py
  # (logged to consultant_deliberations.jsonl). Paid tier_models[F] is used only when Chief approves.
  # hybrid: deterministic baseline + router LLM (router may upgrade; cannot downgrade below baseline).
  # llm: router may also downgrade vs baseline. deterministic: skip router (legacy).
  mode: hybrid
  # Skip the router call when deterministic tier is in this list (save cost on obvious tier-B work).
  skip_router_when_tier_in:
    - B
  router_task: consultant_router
  challenger_task: consultant_challenger
  chief_task: consultant_chief
  tiers_requiring_deliberation:
    - E
    - F
  # Optional (off by default): set to E or F to always run challenger+Chief when the
  # governance_activation_signal matches (forces merged tier floor). Most installs should
  # leave this unset so only the router’s E/F recommendation triggers deliberation.
  # governance_activation_deliberation_floor: E
  # governance_activation_min_chars: 1600
  # governance_activation_min_hits: 3
  # Optional: stop running full deliberation after N approvals this session (then cap tier).
  # max_deliberations_per_session: 10
  # cap_tier_when_deliberation_exhausted: D

# Automatic HR / org consultation: before the chief model runs, delegate once to the
# Hermes profile below and append the subagent summary to this turn's user message.
# Requires chief to have delegate_task; skipped inside subagents. Tune keywords to your org.
hr_consultation:
  enabled: false
  hermes_profile: ag-org-hr
  max_iterations: 28
  min_message_chars: 12
  trigger_keywords:
    - new agent
    - redundant agent
    - headcount
    - org chart
    - RACI
    - HR approval
    - escalate to chief
    - org registry
    - proposal for role
    - retire agent
    - hiring agent
  # goal: optional override string for delegate_task(goal=...)

skip_context_files: false
