# Free-model fallback when paid APIs fail (merge into ~/.hermes/config.yaml).
# Hermes seeds defaults in DEFAULT_CONFIG (see ``_config_version``); override here as needed.
#
# Order after primary failure:
#   1) kimi_router — tier router picks one HF hub id (default: router_provider gemini + gemma-4-31b-it)
#   2) optional_gemini — optional last resort (hosted Gemma/Gemini API)
#
# If you prefer a fully explicit chain instead, set ``fallback_providers: [ ... ]``
# and omit or disable ``free_model_routing``.

free_model_routing:
  enabled: true
  # Hide tier hub ids not listed in local_models/hub/state.json downloaded (when that file exists).
  filter_free_tier_models_by_local_hub: true
  kimi_router:
    router_provider: gemini
    router_model: gemma-4-31b-it
    gemini_native_tier_models:
      - gemma-4-31b-it
    tiers:
      - id: local
        description: "Gemma-4 (Gemini API id) or Qwen when served locally"
        models:
          - gemma-4-31b-it
          - Qwen/QwQ-32B
  optional_gemini:
    enabled: true
    model: gemma-4-31b-it
    only_rate_limit: true
    restore_health_check: true

# Explicit opt-out of any free fallback:
# fallback_providers: []

# Or full manual override (disables synthesis from free_model_routing):
# fallback_providers:
#   - provider: huggingface
#     model: gemma-4-31b-it
#     hf_router: true
#     router_provider: gemini
#     hf_router_tiers: [ ... ]
