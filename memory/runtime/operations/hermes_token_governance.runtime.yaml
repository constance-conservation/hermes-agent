# Token governance runtime (template). Materialize/copy to:
#   ${HERMES_HOME}/workspace/operations/hermes_token_governance.runtime.yaml
#
# Route-down requires DISTINCT tier_models (cheap → capable). A prior edit forced
# gpt-5.4 for A–E, which disabled meaningful per-tier downshifts — restored ladder below.

version: 3
enabled: true
max_agent_turns: 50
dynamic_tier_routing: true
# Default before heuristics: prefer **C** (mid cheap) — not flagship D.
default_routing_tier: C

# Per-tier concrete models (A=cheapest … G=consultant ceiling). Distinct slugs for route-down.
tier_models:
  A: openai/gpt-5-nano
  B: openai/gpt-4.1-mini
  C: openai/gpt-5.4-mini
  D: openai/gpt-5.2
  E: openai/gpt-5.4
  F: gpt-5.3-codex
  G: anthropic/claude-opus-4.6

cost_governance:
  daily_budget_usd: 10.0
  session_budget_usd: 2.50
  spike_threshold_usd_per_min: 0.50
  summary_review_enabled: true
  stall_timeout_expensive_seconds: 120
  stall_timeout_cheap_seconds: 60
  max_nudges_per_turn: 2

provider_health:
  huggingface_max_failures: 1
  default_max_failures: 3

escalation:
  opus_enabled: true
  opus_max_tokens: 4096
  opus_max_per_session: 2
  require_deliberation_for_openrouter_consultant: true

delegation:
  require_context_review: true
  max_model_tier_for_delegates: D
  prefer_free_for_large_context: true
  large_context_threshold_tokens: 10000

openai_primary_mode:
  # When false, Hermes does not apply OpenAI-primary routing/coercion (OPM ladder, native-first policy).
  enabled: false
  default_model: gpt-5.4-mini
  codex_model: gpt-5.3-codex
  allowed_subprocess_models:
    - gpt-5.4-nano
    - gpt-5.4
    - gpt-5.3-codex
  require_direct_openai: true

notes: |
  Runtime governance source of truth is the active file under
  WORKSPACE/memory/runtime/state/hermes-token-governance.runtime.yaml.
